<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诊断测试 - AI 学习诊断系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>诊断测试</h1>
            <div class="breadcrumb" id="breadcrumb">正在准备题目...</div>
        </div>
    </div>

    <main class="container">
        <section id="loadingArea" class="loading card">
            <div class="spinner"></div>
            <p id="loadingText">正在生成诊断题...</p>
            <p class="muted">如果已有缓存题库，会优先直接使用缓存。</p>
        </section>

        <section id="quizArea" style="display:none;">
            <div id="questionSourceMsg" class="info-message" style="display:none;"></div>
            <div class="progress-bar">
                <div class="fill" id="progressFill" style="width:0%;"></div>
            </div>
            <div id="progressText" class="progress-text"></div>
            <div id="questionsContainer"></div>
            <div class="action-row">
                <button id="submitBtn" class="btn btn-primary btn-lg" disabled>
                    提交答案
                </button>
            </div>
        </section>

        <section id="errorArea" style="display:none;">
            <div class="error-message" id="errorMsg"></div>
            <button class="btn btn-outline" onclick="window.location.href='index.html'">返回首页</button>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
